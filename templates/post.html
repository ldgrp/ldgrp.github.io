<article class="$entry-type$">
    <section class="header mt-4 mb-6 flex flex-col gap-1">
        <h1 class="mr-8 sm:mr-10">$title$</h1>
        <div class="flex gap-4">
        <div class="text-sm font-mono text-gray-600 dark:text-gray-300">
            Posted on $date$ · $reading-time$ min read
        </div>
        $if(status)$
        <span class="status status-$status$">$status$</span>
        $endif$
        </div>
    </section>
    <section class="post-body">
        $body$
        $if(last-edited)$
        <div class="my-6">
        <span class="italic text-sm">Last modified $last-edited$</span>
        </div>
        $endif$
    </section>
</article>
<script>
  (function () {
    var body = document.querySelector("article .post-body");
    if (!body) return;
    var headings = body.querySelectorAll("h1[id], h2[id], h3[id], h4[id]");
    Array.prototype.forEach.call(headings, function (h) {
      var a = document.createElement("a");
      a.href = "#" + h.id;
      a.className = "heading-anchor";
      a.setAttribute("aria-label", "Copy link to this section");
      a.addEventListener("click", function (e) {
        e.preventDefault();
        var url = location.origin + location.pathname + "#" + h.id;
        history.replaceState(null, "", "#" + h.id);
        var done = function () {
          a.setAttribute("data-copied", "");
          setTimeout(function () { a.removeAttribute("data-copied"); }, 1200);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(done, done);
        } else {
          done();
        }
      });
      h.insertBefore(a, h.firstChild);
    });
  })();
</script>
$toc$
