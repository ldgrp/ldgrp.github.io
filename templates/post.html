<article class="$entry-type$">
    <section class="header mt-4 mb-6">
        <h1 class="mr-8 sm:mr-10">$title$</h1>
        <div class="flex gap-4 -mt-3">
        <div class="text-sm font-mono text-gray-600 dark:text-gray-300">
            Posted on $date$
        </div>
        $if(status)$
        <span class="status status-$status$">$status$</span>
        $endif$
        </div>
    </section>
    <section>
        $body$
        $if(last-edited)$
        Last modified $last-edited$
        $endif$
    </section>
</article>
