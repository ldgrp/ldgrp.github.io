name: Deploy Hakyll with GitHub Pages

on:
  # Runs on pushes targeting main
  push:
    branches: ["main"]

  # Allows you to run this workflow mannually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  GHC_VERSION: '9.12.4'
  CABAL_VERSION: '3.14.2.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache GHC toolchain
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/.ghcup/ghc/${{ env.GHC_VERSION }}
          ~/.ghcup/ghc/${{ env.GHC_VERSION }}
        key: ${{ runner.os }}-ghcup-ghc-${{ env.GHC_VERSION }}

    - uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ env.GHC_VERSION }}
        cabal-version: ${{ env.CABAL_VERSION }}

    - name: Cache cabal dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cabal
        key: ${{ runner.os }}-cabaldeps-${{ env.GHC_VERSION }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
        restore-keys: |
          ${{ runner.os }}-cabaldeps-${{ env.GHC_VERSION }}-

    - name: Build
      run: cabal build

    - name: Cache tailwind binary
      id: tailwind-cache
      uses: actions/cache@v4
      with:
        path: tailwindcss
        key: ${{ runner.os }}-tailwind-v4.3.2
    - name: Download tailwind
      if: steps.tailwind-cache.outputs.cache-hit != 'true'
      run: |
        curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64
        chmod +x tailwindcss-linux-x64
        mv tailwindcss-linux-x64 tailwindcss

    - name: Compile and minify CSS for production
      run: ./tailwindcss -i css/input.css -o css/style.css --minify
    - name: Generate site
      run: cabal exec site build
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
